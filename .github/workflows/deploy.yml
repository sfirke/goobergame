name: Test and Deploy

on:
  push:
    branches: [main]
  # Lets you trigger a deploy manually from the Actions tab on GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deploy at a time; cancel older in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Job 1: run unit tests
  # --------------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # --------------------------------------------------------------------------
  # Job 2: build and deploy to GitHub Pages (only if tests pass)
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
